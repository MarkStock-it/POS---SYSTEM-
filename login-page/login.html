<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Retail POS System</title>
  <link rel="stylesheet" href="login-styles.css?v=2" />
</head>
<body>
  <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle dark and light mode">
    <svg id="sunIcon" class="theme-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg id="moonIcon" class="theme-icon" style="display: none;" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
  <div class="login-container">
    <div class="login-header">
      <h1>Retail POS System</h1>
      <p>Secure access to your point of sale dashboard</p>
    </div>

    <div class="login-card">
      <form class="login-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">
            <span>Email</span>
          </label>
          <div class="input-wrapper">
            <input
              id="email"
              type="text"
              placeholder="Enter your email"
              autocomplete="username"
              required
              aria-invalid="false"
              aria-describedby="emailError"
            />
          </div>
          <span class="error-message" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password">
            <span>Password</span>
          </label>
          <div class="input-wrapper">
            <input
              id="password"
              type="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
              aria-invalid="false"
              aria-describedby="passwordError"
            />
            <button
              type="button"
              class="toggle-password"
              id="togglePassword"
              aria-label="Toggle password visibility"
              aria-pressed="false"
            >
              <svg id="eyeOpenIcon" class="password-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="eyeClosedIcon" class="password-icon" style="display: none;" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <span class="error-message" id="passwordError"></span>
        </div>

        <div class="form-footer">
          <div></div>
          <a href="#" class="forgot-password" id="forgotPasswordLink" aria-label="Go to forgot password page"
            >Forgot password?</a
          >
        </div>

        <button type="submit" class="login-button" id="loginButton">
          <span class="button-text">Sign In</span>
          <div class="spinner" style="display: none"></div>
        </button>
      </form>
    </div>

    <div class="login-footer">
      <p>© 2026 Retail POS System. All rights reserved.</p>
    </div>
  </div>

  <div class="success-modal" id="successModal">
    <div class="success-modal-content">
      <div class="success-icon">✓</div>
      <h2>Welcome Back!</h2>
      <p>Login successful. Redirecting to dashboard...</p>
      <div class="progress-bar">
        <div class="progress-bar-fill"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../auth-api.js"></script>
  <script src="../New_Index/role-dashboard.js?v=3"></script>
  <script src="../theme-utils.js"></script>
  <script src="login.js"></script>
</body>
</html>
