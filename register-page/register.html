<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Retail POS System</title>
  <link rel="stylesheet" href="register-styles.css" />
</head>
<body>
  <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle dark and light mode">
    <svg id="sunIcon" class="theme-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg id="moonIcon" class="theme-icon" style="display: none;" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>

  <div class="register-container">
    <div class="register-header">
      <h1>Create Account</h1>
      <p>Join the Retail POS System</p>
    </div>

    <div class="register-card">
      <form class="register-form" id="registerForm" novalidate>
        <div class="form-group">
          <label for="fullName"><span>Full Name</span></label>
          <div class="input-wrapper">
            <input id="fullName" type="text" placeholder="Enter your full name" required aria-invalid="false" aria-describedby="fullNameError" />
          </div>
          <span class="error-message" id="fullNameError"></span>
        </div>

        <div class="form-group">
          <label for="email"><span>Email</span></label>
          <div class="input-wrapper">
            <input id="email" type="email" placeholder="Enter your email" autocomplete="email" required aria-invalid="false" aria-describedby="emailError" />
          </div>
          <span class="error-message" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password"><span>Password</span></label>
          <div class="input-wrapper">
            <input id="password" type="password" placeholder="Enter your password (min 6 characters)" autocomplete="new-password" required aria-invalid="false" aria-describedby="passwordError" />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility" aria-pressed="false">
              <svg id="eyeOpenIcon" class="password-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="eyeClosedIcon" class="password-icon" style="display: none;" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <span class="error-message" id="passwordError"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword"><span>Confirm Password</span></label>
          <div class="input-wrapper">
            <input id="confirmPassword" type="password" placeholder="Confirm your password" autocomplete="new-password" required aria-invalid="false" aria-describedby="confirmPasswordError" />
            <button type="button" class="toggle-password" id="toggleConfirmPassword" aria-label="Toggle password visibility" aria-pressed="false">
              <svg id="eyeOpenIcon2" class="password-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="eyeClosedIcon2" class="password-icon" style="display: none;" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <span class="error-message" id="confirmPasswordError"></span>
        </div>

        <div class="form-group">
          <label for="role"><span>Role</span></label>
          <div class="input-wrapper">
            <select id="role" name="role" aria-label="Select user role">
              <option value="cashier">Cashier</option>
              <option value="manager">Manager</option>
              <option value="admin">Admin</option>
              <option value="super-admin">Super Admin</option>
            </select>
          </div>
        </div>

        <button type="submit" class="register-button" id="registerButton">
          <span class="button-text">Create Account</span>
          <div class="spinner" style="display: none"></div>
        </button>
      </form>

      <div class="divider">or</div>

      <div class="login-section">
        <p>Already have an account?</p>
        <button type="button" class="login-button" id="loginButton" aria-label="Go to login page">Sign In</button>
      </div>
    </div>

    <div class="register-footer">
      <p>© 2026 Retail POS System. All rights reserved.</p>
    </div>
  </div>

  <div class="success-modal" id="successModal">
    <div class="success-modal-content">
      <div class="success-icon">✓</div>
      <h2>Account Created!</h2>
      <p>Your account has been created successfully. Redirecting to login...</p>
      <div class="progress-bar">
        <div class="progress-bar-fill"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../auth-api.js"></script>
  <script src="register.js"></script>
</body>
</html>
